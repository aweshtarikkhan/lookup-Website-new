<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Service Details - LookUPp</title>
  <link rel="icon" href="assets/images/logo.png">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/home.css">
  <style>
    .service-detail-hero { padding: 150px 0 80px; text-align: center; background: linear-gradient(180deg, #fef6f6 0%, #ffffff 100%); position: relative; overflow: hidden; }
    .sd-icon { font-size: 4rem; width: 100px; height: 100px; background: rgba(227,30,36,0.08); border-radius: 24px; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; box-shadow: 0 8px 32px rgba(227,30,36,0.15); animation: float 4s ease-in-out infinite; }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    .sd-category { color: var(--primary); font-weight: 700; text-transform: uppercase; letter-spacing: 2px; font-size: 0.85rem; margin-bottom: 12px; display: block; }
    .service-detail-hero h1 { font-size: 3.5rem; margin-bottom: 20px; }
    .service-detail-hero p { max-width: 700px; margin: 0 auto; font-size: 1.2rem; color: var(--gray-400); line-height: 1.8; }
    
    .sd-content { padding: 60px 0; }
    .sd-grid { display: grid; grid-template-columns: 1fr 350px; gap: 60px; align-items: start; }
    
    .sd-main h2 { margin-bottom: 24px; font-size: 2rem; }
    .sd-main p { color: var(--gray-400); font-size: 1.1rem; margin-bottom: 40px; }
    
    .features-list { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .feature-item { background: var(--glass-bg); border: 1px solid var(--glass-border); padding: 20px; border-radius: var(--radius-sm); display: flex; align-items: flex-start; gap: 12px; transition: var(--transition); }
    .feature-item:hover { border-color: rgba(227,30,36,0.3); transform: translateY(-3px); box-shadow: var(--shadow-red); }
    .feature-item i { color: var(--primary); font-size: 1.2rem; margin-top: 2px; }
    .feature-item span { font-weight: 600; color: #111; }
    
    .sd-sidebar { background: #ffffff; border: 1px solid rgba(0,0,0,0.08); border-radius: var(--radius); padding: 32px; box-shadow: var(--shadow); position: sticky; top: 100px; }
    .sd-sidebar h3 { font-size: 1.4rem; margin-bottom: 10px; }
    .sd-sidebar p { color: var(--gray-400); font-size: 0.95rem; margin-bottom: 24px; }
    
    .enquiry-form .form-group { margin-bottom: 16px; }
    .enquiry-form .form-control { width: 100%; padding: 12px 16px; border: 1px solid #ddd; border-radius: 8px; font-family: var(--font-body); font-size: 0.95rem; transition: var(--transition); }
    .enquiry-form .form-control:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(227,30,36,0.1); }
    .enquiry-form textarea.form-control { resize: vertical; min-height: 100px; }
    .enquiry-form .btn { width: 100%; justify-content: center; }

    /* Error state */
    .not-found { text-align: center; padding: 150px 0; }
    .not-found h1 { font-size: 3rem; color: var(--primary); margin-bottom: 20px; }
    
    @media (max-width: 992px) {
      .sd-grid { grid-template-columns: 1fr; }
      .sd-sidebar { position: static; margin-top: 40px; }
    }
    @media (max-width: 768px) {
      .features-list { grid-template-columns: 1fr; }
      .service-detail-hero h1 { font-size: 2.5rem; }
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar"><div class="nav-inner"><a href="index.html" class="nav-logo"><img src="assets/images/logo.png" alt="LookUPp"></a><div class="nav-links"><a href="index.html">Home</a><a href="about.html">About Us</a><a href="services.html" class="active">Services</a><a href="our-work.html">Our Work</a><a href="contact.html">Contact Us</a></div><div class="nav-cta"><a href="contact.html" class="btn btn-primary btn-sm">Get Free Consultation</a><button class="btn btn-login btn-sm" onclick="window.location.href='index.html'" id="login-btn"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> Login</button></div></div></nav>

  <!-- Dynamic Content Container -->
  <div id="dynamic-content">
    <!-- Content injected via JS -->
  </div>

  <!-- Footer -->
  <footer class="footer"><div class="container"><div class="footer-grid"><div class="footer-brand"><a href="index.html" class="nav-logo"><img src="assets/images/logo.png" alt="LookUPp" style="height:40px;"></a><p>Your trusted digital marketing & development partner.</p></div><div class="footer-col"><h4>Quick Links</h4><a href="index.html">Home</a><a href="services.html">Services</a><a href="contact.html">Contact Us</a></div></div><div class="footer-bottom"><p>© 2024 LookUPp. All rights reserved.</p></div></div></footer>

  <!-- Scripts -->
  <script src="js/services-data.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const serviceId = urlParams.get('id');
      const container = document.getElementById('dynamic-content');
      
      // If service exists in our data file
      if (serviceId && window.servicesData && window.servicesData[serviceId]) {
        const service = window.servicesData[serviceId];
        
        // Generate feature list HTML
        const featuresHtml = service.features.map(f => `
          <div class="feature-item">
            <i>✓</i>
            <span>${f}</span>
          </div>
        `).join('');

        // Populate the page
        container.innerHTML = `
          <section class="service-detail-hero">
            <div class="container">
              <div class="sd-icon">${service.icon}</div>
              <span class="sd-category">${service.category}</span>
              <h1>${service.title}</h1>
              <p>${service.shortDesc}</p>
            </div>
          </section>

          <section class="sd-content">
            <div class="container">
              <div class="sd-grid">
                
                <div class="sd-main">
                  <h2>Service Overview</h2>
                  <p>${service.overview}</p>
                  
                  <h2>What's Included</h2>
                  <div class="features-list">
                    ${featuresHtml}
                  </div>
                </div>

                <div class="sd-sidebar">
                  <h3>For Enquiry, Contact Us</h3>
                  <p>Fill out the form below and our experts will get back to you shortly regarding ${service.title}.</p>
                  
                  <form class="enquiry-form" onsubmit="event.preventDefault(); alert('Enquiry sent successfully!');">
                    <div class="form-group">
                      <input type="text" class="form-control" placeholder="Your Name" required>
                    </div>
                    <div class="form-group">
                      <input type="email" class="form-control" placeholder="Email Address" required>
                    </div>
                    <div class="form-group">
                      <input type="tel" class="form-control" placeholder="Phone Number" required>
                    </div>
                    <div class="form-group">
                      <input type="text" class="form-control" value="${service.title}" readonly style="background:#f9f9f9; color:#777; cursor:not-allowed;">
                    </div>
                    <div class="form-group">
                      <textarea class="form-control" placeholder="Tell us about your requirements..." required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Send Enquiry →</button>
                  </form>
                </div>

              </div>
            </div>
          </section>
        `;
        
        // Update page title
        document.title = `${service.title} - LookUPp Services`;
        
      } else {
        // Service not found
        container.innerHTML = `
          <div class="container not-found">
            <h1>Service Not Found</h1>
            <p>Sorry, the service you are looking for does not exist.</p>
            <a href="services.html" class="btn btn-primary" style="margin-top:20px;">Back to All Services</a>
          </div>
        `;
      }
    });
  </script>
</body>
</html>
